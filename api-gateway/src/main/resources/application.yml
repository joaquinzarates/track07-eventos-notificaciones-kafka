server:
  port: 8083

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: event-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/events/**,/api/events

          - id: notification-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/notifications/**,/api/notifications
